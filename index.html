<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>每日减肥打卡</title>
  <!-- 让 iPhone 当成 App 打开 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- App 名字 -->
  <meta name="apple-mobile-web-app-title" content="每日减肥">

  <!-- 图标 -->
  <link rel="apple-touch-icon" href="icon.png">
  <link rel="manifest" href="manifest.json">
  <!-- 启动画面背景颜色 -->
  <meta name="theme-color" content="#ffffff">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f8;
      display: flex;
      justify-content: center;
    }

    .app {
      width: 100%;
      max-width: 420px;
      background: white;
      min-height: 100vh;
      box-shadow: 0 0 20px rgba(0,0,0,0.05);
    }

    .header {
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
      text-align: center;
      border-bottom: 1px solid #eee;
    }

    .section {
      padding: 20px;
    }

    .title {
      font-size: 15px;
      margin-bottom: 10px;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid #ddd;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border: none;
      border-radius: 14px;
      margin-top: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .card {
      background: #f8f9fb;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
    }

    .date {
      color: #888;
      font-size: 13px;
    }

    .weight {
      font-size: 18px;
      font-weight: bold;
    }

    .stat {
      background: #f8f9fb;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 10px;
      font-size: 15px;
    }

    canvas {
      background: #f8f9fb;
      border-radius: 12px;
      padding: 10px;
    }

    .footer {
      padding: 30px 20px;
      text-align: center;
      color: #999;
      font-size: 13px;
    }
  </style>
</head>
<body>

<div class="app">

  <div class="header">每日减肥打卡</div>

  <div class="section">
    <div class="title">选择用户</div>
    <select id="userSelect" onchange="render()">
      <option value="user1">徐庆</option>
      <option value="user2">疏义康</option>
      <option value="user3">用户 3</option>
      <option value="user4">用户 4</option>
      <option value="user5">用户 5</option>
    </select>
  </div>

  <div class="section">
    <div class="title">输入今天体重（kg）</div>
    <input id="weightInput" type="number" step="0.1" placeholder="例如 65.3" />
    <button onclick="saveWeight()">保存今天体重</button>
  </div>

  <div class="section">
    <div class="title">减肥趋势</div>
    <canvas id="chart"></canvas>
  </div>

  <div class="section">
    <div class="title">统计</div>
    <div id="stats"></div>
  </div>

  <div class="section">
    <div class="title">历史记录</div>
    <div id="history"></div>
  </div>

  <div class="section">
    <button onclick="checkIn()">今日已完成打卡</button>
  </div>

  <div class="footer">5 个人一起减肥，更容易坚持 💪</div>

</div>

<script>
  function getUserKey() {
    return "weight_records_" + document.getElementById("userSelect").value;
  }

  function getToday() {
    const d = new Date();
    return d.getFullYear() + "-" + (d.getMonth()+1) + "-" + d.getDate();
  }

  function saveWeight() {
    const weight = document.getElementById("weightInput").value;

    if (!weight) {
      alert("请输入体重");
      return;
    }

    let data = JSON.parse(localStorage.getItem(getUserKey())) || [];

    data.unshift({
      date: getToday(),
      weight: parseFloat(weight)
    });

    localStorage.setItem(getUserKey(), JSON.stringify(data));

    document.getElementById("weightInput").value = "";

    render();
  }

  function render() {
    let data = JSON.parse(localStorage.getItem(getUserKey())) || [];

    const history = document.getElementById("history");
    history.innerHTML = "";

    data.forEach(item => {
      history.innerHTML += `
        <div class="card">
          <div>
            <div class="date">${item.date}</div>
          </div>
          <div class="weight">${item.weight} kg</div>
        </div>
      `;
    });

    renderStats(data);
    renderChart(data);
  }

  function renderStats(data) {
    const stats = document.getElementById("stats");

    if (data.length < 2) {
      stats.innerHTML = "至少记录 2 天才会显示变化";
      return;
    }

    const first = data[data.length - 1].weight;
    const latest = data[0].weight;

    const diff = (latest - first).toFixed(1);

    if (diff < 0) {
      stats.innerHTML = `已经瘦了 ${Math.abs(diff)} kg，继续保持 🔥`;
    } else if (diff > 0) {
      stats.innerHTML = `最近胖了 ${diff} kg，要控制一下了 😅`;
    } else {
      stats.innerHTML = `体重保持得很好 👍`;
    }
  }

  let chart;

  function renderChart(data) {
    const ctx = document.getElementById('chart');

    const labels = data.map(d => d.date).reverse();
    const weights = data.map(d => d.weight).reverse();

    if (chart) chart.destroy();

    chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '体重变化',
          data: weights
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        }
      }
    });
  }

  function checkIn() {
    alert("今日打卡成功！坚持就是胜利 💪");
  }

  render();
</script>

</body>
</html>
