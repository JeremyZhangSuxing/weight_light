
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;700;900&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  .arena{background:#1a0a0a;min-height:600px;border-radius:16px;overflow:hidden;position:relative;font-family:'Noto Sans SC',sans-serif;}
  .bg-pattern{position:absolute;inset:0;opacity:0.04;background-image:repeating-linear-gradient(45deg,#fff 0,#fff 1px,transparent 0,transparent 50%);background-size:20px 20px;}
  .title-bar{text-align:center;padding:14px 12px 10px;position:relative;z-index:2;}
  .title-main{font-family:'Ma Shan Zheng',cursive;font-size:26px;color:#ff6b35;letter-spacing:4px;text-shadow:0 0 20px rgba(255,107,53,0.5);}
  .title-sub{font-size:11px;color:#888;letter-spacing:2px;margin-top:2px;}
  .hp-bar-row{display:flex;gap:10px;padding:0 12px 10px;position:relative;z-index:2;}
  .hp-wrap{flex:1;}
  .hp-name{font-size:11px;font-weight:700;margin-bottom:4px;letter-spacing:1px;}
  .hp-name.mil{color:#ff6b35;text-align:left;}
  .hp-name.dil{color:#a78bfa;text-align:right;}
  .hp-bar{height:10px;border-radius:5px;background:#333;overflow:hidden;position:relative;}
  .hp-fill{height:100%;border-radius:5px;transition:width 0.4s cubic-bezier(.34,1.56,.64,1);}
  .hp-fill.mil{background:linear-gradient(90deg,#ff6b35,#ff9a3c);}
  .hp-fill.dil{background:linear-gradient(90deg,#a78bfa,#c4b5fd);float:right;}
  .hp-num{font-size:10px;color:#666;margin-top:2px;}
  .hp-num.mil{text-align:left;}
  .hp-num.dil{text-align:right;}
  .stage{display:flex;align-items:flex-end;justify-content:space-between;padding:0 16px 0;position:relative;z-index:2;min-height:200px;}
  .char-wrap{display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
  .char-face{width:90px;height:90px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:50px;position:relative;transition:transform 0.15s;cursor:pointer;user-select:none;border:3px solid transparent;}
  .char-face.mil{background:radial-gradient(circle at 40% 35%,#ff9a3c,#cc4400);border-color:#ff6b35;box-shadow:0 0 20px rgba(255,107,53,0.4);}
  .char-face.dil{background:radial-gradient(circle at 40% 35%,#c4b5fd,#7c3aed);border-color:#a78bfa;box-shadow:0 0 20px rgba(167,139,250,0.4);}
  .char-face:active{transform:scale(0.92);}
  .char-face.shake{animation:shake 0.4s ease;}
  .char-face.attack-right{animation:atk-r 0.35s ease;}
  .char-face.attack-left{animation:atk-l 0.35s ease;}
  .char-face.hit{animation:hit-flash 0.3s ease;}
  .char-name{font-size:13px;font-weight:700;letter-spacing:1px;}
  .char-name.mil{color:#ff6b35;}
  .char-name.dil{color:#a78bfa;}
  .char-title{font-size:10px;color:#666;letter-spacing:1px;}
  .char-status{font-size:18px;margin-top:2px;min-height:24px;}
  .vs-center{display:flex;flex-direction:column;align-items:center;gap:4px;padding-bottom:20px;}
  .vs-text{font-family:'Ma Shan Zheng',cursive;font-size:30px;color:#ff6b35;text-shadow:0 0 15px rgba(255,107,53,0.6);}
  .round-badge{background:#2a1a0a;border:1px solid #ff6b35;border-radius:20px;padding:2px 10px;font-size:11px;color:#ff9a3c;}
  .bubble-zone{min-height:80px;padding:8px 14px;position:relative;z-index:2;}
  .bubble{border-radius:12px;padding:10px 14px;max-width:75%;font-size:13px;line-height:1.5;position:relative;animation:pop-in 0.3s cubic-bezier(.34,1.56,.64,1);}
  .bubble.mil{background:#2a1005;border:1px solid #ff6b35;color:#ffcca0;border-radius:12px 12px 12px 2px;margin-left:0;}
  .bubble.dil{background:#1a0d2e;border:1px solid #a78bfa;color:#ddd6fe;border-radius:12px 12px 2px 12px;margin-left:auto;}
  .bubble::after{content:attr(data-emotion);position:absolute;top:-10px;right:8px;font-size:16px;}
  .action-bar{padding:8px 12px;position:relative;z-index:2;}
  .action-label{font-size:10px;color:#555;letter-spacing:2px;margin-bottom:6px;}
  .btn-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;}
  .btn-grid.dil-btns{margin-top:6px;}
  .atk-btn{padding:9px 8px;border-radius:10px;border:1px solid;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.15s;letter-spacing:0.5px;position:relative;overflow:hidden;}
  .atk-btn::before{content:'';position:absolute;inset:0;background:rgba(255,255,255,0.1);opacity:0;transition:opacity 0.15s;}
  .atk-btn:hover::before{opacity:1;}
  .atk-btn:active{transform:scale(0.95);}
  .atk-btn.mil-btn{background:#1a0800;border-color:#cc4400;color:#ff9a3c;}
  .atk-btn.dil-btn{background:#0d0520;border-color:#7c3aed;color:#c4b5fd;}
  .btn-divider{text-align:center;font-size:10px;color:#444;letter-spacing:2px;margin:6px 0 4px;}
  .effect-layer{position:absolute;inset:0;pointer-events:none;z-index:10;overflow:hidden;}
  .hit-effect{position:absolute;font-size:28px;font-weight:900;pointer-events:none;animation:fly-up 0.7s ease forwards;}
  .crack-text{position:absolute;font-family:'Ma Shan Zheng',cursive;font-size:22px;pointer-events:none;animation:crack-anim 0.8s ease forwards;}
  .combo-flash{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Ma Shan Zheng',cursive;font-size:48px;pointer-events:none;animation:combo-anim 0.6s ease forwards;white-space:nowrap;}
  .log-area{padding:6px 14px 10px;max-height:80px;overflow-y:auto;scrollbar-width:none;}
  .log-area::-webkit-scrollbar{display:none;}
  .log-line{font-size:11px;color:#555;line-height:1.6;border-left:2px solid #222;padding-left:6px;margin-bottom:2px;}
  .log-line.new{color:#888;border-left-color:#444;}
  .result-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.85);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;border-radius:16px;}
  .result-title{font-family:'Ma Shan Zheng',cursive;font-size:48px;margin-bottom:12px;animation:result-pop 0.5s cubic-bezier(.34,1.56,.64,1);}
  .result-msg{font-size:16px;color:#aaa;margin-bottom:20px;text-align:center;line-height:1.6;}
  .restart-btn{background:#ff6b35;color:#fff;border:none;padding:12px 32px;border-radius:25px;font-size:15px;font-weight:700;cursor:pointer;letter-spacing:2px;transition:transform 0.15s;}
  .restart-btn:active{transform:scale(0.95);}
  @keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}
  @keyframes atk-r{0%{transform:translateX(0);}40%{transform:translateX(30px) scale(1.1);}100%{transform:translateX(0);}}
  @keyframes atk-l{0%{transform:translateX(0);}40%{transform:translateX(-30px) scale(1.1);}100%{transform:translateX(0);}}
  @keyframes hit-flash{0%{filter:brightness(1);}30%{filter:brightness(3);}60%{filter:brightness(0.5);}100%{filter:brightness(1);}}
  @keyframes fly-up{0%{opacity:1;transform:translate(-50%,-50%) scale(0.5);}60%{opacity:1;transform:translate(-50%,-120%) scale(1.2);}100%{opacity:0;transform:translate(-50%,-180%) scale(0.8);}}
  @keyframes crack-anim{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3) rotate(-10deg);}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2) rotate(5deg);}100%{opacity:0;transform:translate(-50%,-80%) scale(0.9) rotate(-3deg);}}
  @keyframes combo-anim{0%{opacity:1;transform:translate(-50%,-50%) scale(0.3);}40%{opacity:1;transform:translate(-50%,-50%) scale(1.3);}70%{opacity:1;transform:translate(-50%,-50%) scale(1);}100%{opacity:0;transform:translate(-50%,-50%) scale(1.1);}}
  @keyframes pop-in{0%{opacity:0;transform:scale(0.7);}100%{opacity:1;transform:scale(1);}}
  @keyframes result-pop{0%{transform:scale(0.3);opacity:0;}100%{transform:scale(1);opacity:1;}}
  @keyframes glow-pulse{0%,100%{box-shadow:0 0 20px rgba(255,107,53,0.4);}50%{box-shadow:0 0 40px rgba(255,107,53,0.8);}}
</style>

<h2 class="sr-only">婆媳修罗场互动游戏，点击按钮让婆婆和媳妇互怼</h2>
<div class="arena" id="arena">
  <div class="bg-pattern"></div>
  <div class="effect-layer" id="fx"></div>

  <div class="title-bar">
    <div class="title-main">婆媳修罗场</div>
    <div class="title-sub">◆ 家庭战争模拟器 · 年度终极对决 ◆</div>
  </div>

  <div class="hp-bar-row">
    <div class="hp-wrap">
      <div class="hp-name mil">婆婆 怒气值</div>
      <div class="hp-bar"><div class="hp-fill mil" id="mil-hp" style="width:100%"></div></div>
      <div class="hp-num mil" id="mil-hp-num">100 / 100</div>
    </div>
    <div class="hp-wrap">
      <div class="hp-name dil" style="text-align:right">媳妇 耐心值</div>
      <div class="hp-bar"><div class="hp-fill dil" id="dil-hp" style="width:100%"></div></div>
      <div class="hp-num dil" id="dil-hp-num">100 / 100</div>
    </div>
  </div>

  <div class="stage">
    <div class="char-wrap">
      <div class="char-face mil" id="mil-face" onclick="charClick('mil')">👵</div>
      <div class="char-name mil">王秀珍</div>
      <div class="char-title" style="color:#ff9a3c55">婆婆 · 战斗力 MAX</div>
      <div class="char-status" id="mil-status">😤</div>
    </div>
    <div class="vs-center">
      <div class="vs-text">VS</div>
      <div class="round-badge" id="round-badge">第 1 回合</div>
    </div>
    <div class="char-wrap">
      <div class="char-face dil" id="dil-face" onclick="charClick('dil')">👩</div>
      <div class="char-name dil">林小美</div>
      <div class="char-title" style="color:#a78bfa55">媳妇 · 忍耐极限</div>
      <div class="char-status" id="dil-status">😑</div>
    </div>
  </div>

  <div class="bubble-zone" id="bubble-zone">
    <div class="bubble mil" data-emotion="💢">我儿子娶你之前，白白净净的，现在瞧瞧，一顿饭能吃三碗！</div>
  </div>

  <div class="action-bar">
    <div class="action-label">— 婆婆出招 —</div>
    <div class="btn-grid">
      <button class="atk-btn mil-btn" onclick="milAttack(0)">👶 催生大法</button>
      <button class="atk-btn mil-btn" onclick="milAttack(1)">🍳 嫌弃厨艺</button>
      <button class="atk-btn mil-btn" onclick="milAttack(2)">💸 哭穷要钱</button>
      <button class="atk-btn mil-btn" onclick="milAttack(3)">📺 前女友比较</button>
    </div>
    <div class="btn-divider">— 媳妇反击 —</div>
    <div class="btn-grid dil-btns">
      <button class="atk-btn dil-btn" onclick="dilAttack(0)">🔥 怼回去</button>
      <button class="atk-btn dil-btn" onclick="dilAttack(1)">😤 翻旧账</button>
      <button class="atk-btn dil-btn" onclick="dilAttack(2)">📱 找老公评理</button>
      <button class="atk-btn dil-btn" onclick="dilAttack(3)">🧳 威胁离婚</button>
    </div>
  </div>

  <div class="log-area" id="log-area"></div>

  <div class="result-overlay" id="result" style="display:none">
    <div class="result-title" id="result-title" style="color:#ff6b35">婆婆赢了！</div>
    <div class="result-msg" id="result-msg">媳妇耐心耗尽，选择沉默是金</div>
    <button class="restart-btn" onclick="restart()">再来一局 🔄</button>
  </div>
</div>

<script>
  const milLines = [
    ["都这个岁数了还不要孩子，你是不是有问题啊？","我就说嘛，你们年轻人啊，自私！","趁年轻生，老了生不了哭去吧！","我儿子等不起啊，你知道吗！"],
    ["你这菜做的什么玩意儿？放那么多盐！","我儿子从小吃我做的菜，哪受过这委屈","连个饭都做不好，还指望干啥？","我给你看看什么叫真正的家常菜！"],
    ["你们挣那么多钱，就不知道孝敬孝敬我们？","我生儿子养儿子，到头来落这下场？","你妈那边肯定没少拿吧，我们就啥都没有？","钱进了你口袋就是你的了，是不是！"],
    ["他前女友多懂事啊，人家妈妈我都认识","人家不像你，眼睛长头顶上","早知道就让他们在一起了，多好","你哪里比得上人家呢，就说说嘛"]
  ];
  const dilLines = [
    ["您催我不如催您儿子，造孩子要两个人的！","生不生是我的身体我的权利，您管得着吗？","您要是那么想要孙子，自己再生一个啊！","催催催，您催孩子读书这么上心就好了！"],
    ["我做饭是一般，可您儿子也没嫌弃过啊？","您天天指点，要不您来做，我洗碗行了吧？","每个人口味不同，您没听说过吗？","您要觉得我做得不好，大可以自己动手！"],
    ["我们挣的钱贴补家用已经够多了，有账吗？","您儿子的钱也是我们共同挣的，凭什么只算我的？","这话说的，好像我欠您几百万一样！","孝顺是心意，不是交换，您搞清楚！"],
    ["那您当初怎么不让他们在一起呢？","喜欢她你去找她啊，我又没拦着！","比来比去，您儿子是二手市场的货吗？","这辈子我都不嫁人了，省得天天被比较！"]
  ];
  const hitFx = ["💥","👊","⚡","💢","🔥","💫","✨","😱"];
  const crackWords = ["绝了！","实名diss！","致命一击！","破防了！","狠话！","太真实了！","话糙理不糙！","我emo了"];
  let milHp=100,dilHp=100,round=1,busy=false,combo=0,lastAttacker='';

  function $(id){return document.getElementById(id);}

  function updateHp(){
    $('mil-hp').style.width=milHp+'%';
    $('dil-hp').style.width=dilHp+'%';
    $('mil-hp-num').textContent=milHp+' / 100';
    $('dil-hp-num').textContent=dilHp+' / 100';
    $('mil-status').textContent=milHp>66?'😤':milHp>33?'😡':'🤯';
    $('dil-status').textContent=dilHp>66?'😑':dilHp>33?'😠':'😭';
  }

  function showBubble(text,side,emotion){
    const zone=$('bubble-zone');
    const b=document.createElement('div');
    b.className='bubble '+side;
    b.textContent=text;
    b.setAttribute('data-emotion',emotion||'');
    zone.innerHTML='';
    zone.appendChild(b);
  }

  function spawnFx(x,y,type,text,color){
    const fx=$('fx');
    const el=document.createElement('div');
    if(type==='hit'){
      el.className='hit-effect';
      el.textContent=hitFx[Math.floor(Math.random()*hitFx.length)];
      el.style.cssText=`left:${x}px;top:${y}px;color:${color};font-size:32px;`;
    } else if(type==='crack'){
      el.className='crack-text';
      el.textContent=text||crackWords[Math.floor(Math.random()*crackWords.length)];
      el.style.cssText=`left:${x}px;top:${y}px;color:${color};`;
    } else if(type==='combo'){
      el.className='combo-flash';
      el.textContent=text;
      el.style.cssText=`color:${color};text-shadow:0 0 30px ${color};`;
    }
    fx.appendChild(el);
    setTimeout(()=>el.remove(),800);
  }

  function addLog(text){
    const log=$('log-area');
    const line=document.createElement('div');
    line.className='log-line new';
    line.textContent='第'+round+'回合 · '+text;
    log.prepend(line);
    if(log.children.length>8) log.lastChild.remove();
  }

  function doAttack(attacker,lineIdx){
    if(busy)return;
    busy=true;
    const isMil=attacker==='mil';
    const lines=isMil?milLines[lineIdx]:dilLines[lineIdx];
    const text=lines[Math.floor(Math.random()*lines.length)];
    const emotion=isMil?'💢':'💜';
    showBubble(text,attacker,emotion);

    const atk=$('mil-face');const def=$('dil-face');
    const atkEl=isMil?atk:def; const defEl=isMil?def:atk;
    atkEl.classList.add(isMil?'attack-right':'attack-left');
    setTimeout(()=>{
      defEl.classList.add('hit');
      const dmg=Math.floor(Math.random()*15)+8;
      if(isMil){dilHp=Math.max(0,dilHp-dmg);}else{milHp=Math.max(0,milHp-dmg);}
      updateHp();
      const defRect=defEl.getBoundingClientRect();
      const arenaRect=$('arena').getBoundingClientRect();
      const fx_x=defRect.left-arenaRect.left+defRect.width/2;
      const fx_y=defRect.top-arenaRect.top;
      spawnFx(fx_x,fx_y,'hit',null,isMil?'#ff6b35':'#a78bfa');
      if(Math.random()>0.5) spawnFx(fx_x+30,fx_y+30,'crack',null,isMil?'#ff9a3c':'#c4b5fd');
      if(attacker===lastAttacker){combo++;if(combo>=2)spawnFx(0,0,'combo',combo+'连击！',isMil?'#ff6b35':'#a78bfa');}
      else{combo=0;}
      lastAttacker=attacker;
      addLog((isMil?'婆婆':'媳妇')+'出击 -'+dmg+' ('+text.slice(0,12)+'...)');
      round++;
      $('round-badge').textContent='第 '+round+' 回合';
    },180);
    setTimeout(()=>{
      atkEl.classList.remove('attack-right','attack-left');
      defEl.classList.remove('hit');
      busy=false;
      checkEnd();
    },400);
  }

  function milAttack(i){doAttack('mil',i);}
  function dilAttack(i){doAttack('dil',i);}

  function charClick(who){
    const el=$(who+'-face');
    el.classList.add('shake');
    setTimeout(()=>el.classList.remove('shake'),400);
    spawnFx(who==='mil'?60:240,100,'hit',null,who==='mil'?'#ff6b35':'#a78bfa');
  }

  function checkEnd(){
    if(dilHp<=0||milHp<=0){
      const milWon=dilHp<=0;
      $('result-title').textContent=milWon?'婆婆胜！👵':'媳妇赢了！👩';
      $('result-title').style.color=milWon?'#ff6b35':'#a78bfa';
      const endings=milWon?['媳妇耐心耗尽，选择以后少回婆家','媳妇决定修炼"左耳进右耳出"神功','媳妇默默掏出手机挂咸鱼...']:
              ['婆婆败下阵来，三天内不敢发声','婆婆转移战场，去找邻居诉苦了','婆婆打电话给儿子：你媳妇欺负我！'];
      $('result-msg').textContent=endings[Math.floor(Math.random()*endings.length)];
      $('result').style.display='flex';
    }
  }

  function restart(){
    milHp=100;dilHp=100;round=1;busy=false;combo=0;lastAttacker='';
    updateHp();
    $('round-badge').textContent='第 1 回合';
    $('result').style.display='none';
    $('log-area').innerHTML='';
    showBubble('新的一局开始了，谁先动手？','mil','⚔️');
  }

  updateHp();
</script>
